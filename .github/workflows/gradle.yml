name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew
      shell: bash

    - name: Build with Gradle Wrapper and init script
      run: ./gradlew build -I init.gradle --stacktrace -Dorg.gradle.java.home="$env:JAVA_HOME"

  dependency-submission:
    runs-on: windows-latest          # 改为 windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew
      shell: bash

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582
      env:
        GRADLE_OPTS: "-Dorg.gradle.java.home=$env:JAVA_HOME"
