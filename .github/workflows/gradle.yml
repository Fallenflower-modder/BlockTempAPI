name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew
      shell: bash

    - name: Build with Gradle Wrapper and init script
      run: ./gradlew build -I init.gradle --stacktrace

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: block-thermo-api           
        path: build/libs/*.jar      
        # 如果保留构建后的整个目录，可以用 path: build/libs/
        # 也可以指定多个路径，每行一个
        if-no-files-found: warn    

  dependency-submission:
    runs-on: windows-latest          
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew
      shell: bash

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582

